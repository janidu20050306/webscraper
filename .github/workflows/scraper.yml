name: Daily Real Estate Scraper

on:
  schedule:
    - cron: '0 6 * * *'   # Every day at 6 AM UTC (11:30 AM IST)
  workflow_dispatch:        # Allow manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper (New York)
        run: python real_estate_scraper.py --city newyork --maxpages 5

      - name: Commit & push scraped data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name  "GitHub Actions Bot"
          git add output/ scraper_log.txt
          git diff --quiet && git diff --staged --quiet || \
            git commit -m "chore: auto-update listings $(date +'%Y-%m-%d %H:%M UTC')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
